services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr_backend
    restart: always
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
      - MONGODB_DB_NAME=ocr_db
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - BACKEND_CORS_ORIGINS=["http://localhost", "http://localhost:3000"]
      # Disable Paddle OneDNN/new executor (backup; PaddleOCR uses enable_mkldnn=False)
      - FLAGS_use_mkldnn=0
      - FLAGS_use_new_executor=0
      # Skip slow HuggingFace connectivity check on startup
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    ports:
      - "8000:8000"
    volumes:
      # Mount local backend so code changes apply without rebuild; uvicorn --reload restarts on save
      - ./backend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - mongodb
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ocr_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      # Backend URL for Next.js server-side rewrite (proxy /api → backend)
      - API_BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      # Mount local frontend so code changes apply without rebuild; Next.js dev server hot-reloads
      - ./frontend:/app
      # Keep container node_modules (don't overwrite with host)
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    container_name: ocr_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: ocr_nginx
    restart: always
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  mongodb_data:
  frontend_node_modules:

networks:
  app-network:
